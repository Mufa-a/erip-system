{% extends 'base.html' %}
{% block title %}Generate Payroll{% endblock %}
{% block page_title %}Generate Payroll{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6">
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Employee *</label>
                <select name="employee"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                    <option value="">-- Select Employee --</option>
                    {% for emp in employees %}
                    <option value="{{ emp.pk }}">{{ emp.full_name }} (KES {{ emp.basic_salary }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Month *</label>
                <input type="month" name="month" value="{{ today }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Allowances (KES)</label>
                <input type="number" name="allowances" value="0" step="0.01"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Overtime (KES)</label>
                <input type="number" name="overtime" value="0" step="0.01"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Other Deductions (KES)</label>
                <input type="number" name="other_deductions" value="0" step="0.01"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                <textarea name="notes" rows="2"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
        </div>
        <div class="bg-blue-50 rounded-lg p-4 mt-4">
            <p class="text-sm text-blue-700">
                <i class="fas fa-info-circle mr-1"></i>
                PAYE, NSSF and NHIF will be calculated automatically using Kenya tax rates.
            </p>
        </div>
        <div class="flex space-x-3 mt-6">
            <button type="submit"
                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-calculator mr-2"></i>Generate Payroll
            </button>
            <a href="{% url 'payroll_list' %}"
                class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
