{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Verified — ERIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #13161e; --border: #22273a;
      --accent: #4f7cff; --accent2: #7c4fff;
      --text: #e8eaf0; --muted: #6b7080; --success: #34d399;
    }
    body {
      min-height: 100vh; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; color: var(--text);
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.18; pointer-events: none; }
    .blob-1 { width: 500px; height: 500px; background: var(--success); top: -150px; left: -150px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent); bottom: -100px; right: -100px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 56px 40px 48px;
      max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(52,211,153,0.12); border: 1.5px solid rgba(52,211,153,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      animation: pop 0.5s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .icon svg { width: 32px; height: 32px; stroke: var(--success); }

    h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 12px; }
    p  { color: var(--muted); font-size: 14px; line-height: 1.7; margin-bottom: 36px; }

    .btn {
      display: inline-block; padding: 14px 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px; color: #fff; text-decoration: none;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
      </svg>
    </div>
    <h1>You're verified!</h1>
    <p>Your email has been confirmed. Your ERIP account is fully active and ready to go.</p>
    <a href="{% url 'dashboard' %}" class="btn">Go to Dashboard →</a>
  </div>
</body>
</html>
