{% extends 'base.html' %}
{% block title %}{{ action }} User{% endblock %}
{% block page_title %}{{ action }} User{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto rounded-xl p-6" style="background:var(--card-bg); border:1px solid var(--card-border); box-shadow:var(--card-shadow);">
    <form method="POST">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div>
                <label class="form-label">Username *</label>
                <input type="text" name="username"
                    value="{{ edit_user.username|default:'' }}"
                    {% if action == 'Edit' %}readonly{% endif %}
                    class="form-input" required>
            </div>

            <div>
                <label class="form-label">
                    Password {% if action == 'Edit' %}<span style="color:var(--text-muted); font-weight:400;">(leave blank to keep)</span>{% else %}*{% endif %}
                </label>
                <input type="password" name="password"
                    class="form-input"
                    {% if action == 'Add' %}required{% endif %}>
            </div>

            <div>
                <label class="form-label">First Name</label>
                <input type="text" name="first_name"
                    value="{{ edit_user.first_name|default:'' }}"
                    class="form-input">
            </div>

            <div>
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name"
                    value="{{ edit_user.last_name|default:'' }}"
                    class="form-input">
            </div>

            <div>
                <label class="form-label">Email</label>
                <input type="email" name="email"
                    value="{{ edit_user.email|default:'' }}"
                    class="form-input">
            </div>

            <div>
                <label class="form-label">Phone</label>
                <input type="text" name="phone"
                    value="{{ edit_user.phone|default:'' }}"
                    class="form-input"
                    placeholder="0712345678">
            </div>

            <div>
                <label class="form-label">Role *</label>
                <select name="role" class="form-input">
                    {% for value, label in roles %}
                    <option value="{{ value }}"
                        {% if edit_user.role == value %}selected{% endif %}>
                        {{ label }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            {% if action == 'Edit' %}
            <div class="flex items-center gap-3 mt-2">
                <input type="checkbox" name="is_active" id="is_active"
                    {% if edit_user.is_active %}checked{% endif %}
                    class="w-4 h-4 rounded"
                    style="accent-color:#6366f1;">
                <label for="is_active" class="form-label mb-0">Account Active</label>
            </div>
            {% endif %}

        </div>

        <div class="flex gap-3 mt-6 flex-wrap">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> {{ action }} User
            </button>
            <a href="{% url 'user_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
