{% extends 'base_auth.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-8 rounded-2xl" style="background:var(--card-bg); border:1px solid var(--card-border);">
    
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold" style="color:var(--text-main);">Forgot Password?</h1>
      <p class="text-sm mt-2" style="color:var(--text-muted);">
        Enter your email and we'll send you a reset link.
      </p>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-xs font-medium mb-1.5" style="color:var(--text-muted);">Email Address</label>
        <input type="email" name="email" required autofocus
          class="w-full px-3 py-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          style="background:var(--table-head-bg); border:1px solid var(--card-border); color:var(--text-main);"
          placeholder="you@example.com">
      </div>
      <button type="submit"
        class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
        Send Reset Link
      </button>
    </form>

    <p class="text-center text-xs mt-6" style="color:var(--text-muted);">
      Remember it? <a href="{% url 'login' %}" class="text-blue-400 hover:underline">Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
