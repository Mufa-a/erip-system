{% extends 'base_auth.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-8 rounded-2xl text-center" style="background:var(--card-bg); border:1px solid var(--card-border);">
    <div class="text-5xl mb-4">✅</div>
    <h1 class="text-2xl font-bold mb-2" style="color:var(--text-main);">Password Reset!</h1>
    <p class="text-sm" style="color:var(--text-muted);">Your password has been set. You can now log in.</p>
    <a href="{% url 'login' %}"
      class="inline-block mt-6 bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
      Go to Login
    </a>
  </div>
</div>
{% endblock %}
