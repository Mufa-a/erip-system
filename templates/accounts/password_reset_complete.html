<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset - ERIP System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0f16;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -150px; right: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-card {
            background: #181b26;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .logo-wrap { margin-bottom: 32px; }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }
        .logo-title { font-size: 22px; font-weight: 600; color: #e8eaf0; letter-spacing: -0.3px; }
        .logo-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .emoji { font-size: 36px; margin-bottom: 12px; display: block; }
        .msg { font-size: 13px; color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
        .btn-signin {
            width: 100%;
            padding: 11px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
            letter-spacing: 0.2px;
            text-decoration: none;
            display: block;
        }
        .btn-signin:hover { background: #4f46e5; box-shadow: 0 4px 16px rgba(99,102,241,0.35); }
        .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }
        .footer-text { font-size: 12px; color: #4b5563; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-wrap">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <div class="logo-title">ERIP System</div>
        <div class="logo-sub">Password Reset Complete</div>
    </div>
    <span class="emoji">✅</span>
    <p class="msg">Your password has been reset successfully. You can now sign in with your new password.</p>
    <a href="{% url 'login' %}" class="btn-signin">Sign In</a>
    <div class="divider"></div>
    <div class="footer-text">ERIP System &mdash; Business Management</div>
</div>
</body>
</html>
