{% extends 'base_auth.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-8 rounded-2xl" style="background:var(--card-bg); border:1px solid var(--card-border);">
    
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold" style="color:var(--text-main);">Set New Password</h1>
      <p class="text-sm mt-2" style="color:var(--text-muted);">Must be at least 8 characters.</p>
    </div>

    {% if validlink %}
    <form method="POST">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-xs font-medium mb-1.5" style="color:var(--text-muted);">New Password</label>
        <input type="password" name="new_password1" required
          class="w-full px-3 py-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          style="background:var(--table-head-bg); border:1px solid var(--card-border); color:var(--text-main);">
      </div>
      <div class="mb-6">
        <label class="block text-xs font-medium mb-1.5" style="color:var(--text-muted);">Confirm New Password</label>
        <input type="password" name="new_password2" required
          class="w-full px-3 py-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          style="background:var(--table-head-bg); border:1px solid var(--card-border); color:var(--text-main);">
      </div>
      {% if form.errors %}
      <div class="mb-4 p-3 rounded-lg text-sm" style="background:#450a0a; color:#fca5a5;">
        {{ form.errors }}
      </div>
      {% endif %}
      <button type="submit"
        class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
        Reset Password
      </button>
    </form>
    {% else %}
    <div class="text-center p-4 rounded-lg" style="background:#450a0a; color:#fca5a5;">
      This reset link is invalid or has expired.
      <a href="{% url 'password_reset' %}" class="block mt-3 text-blue-400 hover:underline">Request a new one</a>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
