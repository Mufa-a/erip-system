{% extends 'base.html' %}
{% block title %}Create Company{% endblock %}
{% block page_title %}Create Company{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto rounded-xl p-6" style="background:var(--card-bg); border:1px solid var(--card-border); box-shadow:var(--card-shadow);">
    <form method="POST">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div class="md:col-span-2">
                <label class="form-label">Company Name *</label>
                <input type="text" name="name" class="form-input"
                    placeholder="My Business Ltd" required>
            </div>

            <div>
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input"
                    placeholder="info@mybusiness.com">
            </div>

            <div>
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-input"
                    placeholder="0712345678">
            </div>

            <div>
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-input"
                    placeholder="Nairobi">
            </div>

            <div>
                <label class="form-label">KRA PIN</label>
                <input type="text" name="tax_number" class="form-input"
                    placeholder="P000000000Z">
            </div>

            <div>
                <label class="form-label">Currency</label>
                <select name="currency" class="form-input">
                    <option value="KES">KES - Kenyan Shilling</option>
                    <option value="USD">USD - US Dollar</option>
                    <option value="UGX">UGX - Ugandan Shilling</option>
                    <option value="TZS">TZS - Tanzanian Shilling</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="form-label">Address</label>
                <textarea name="address" rows="2" class="form-input"
                    placeholder="Physical address..."></textarea>
            </div>

        </div>

        <div class="flex gap-3 mt-6 flex-wrap">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-building"></i> Create Company
            </button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
