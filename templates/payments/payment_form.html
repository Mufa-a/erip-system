{% extends 'base.html' %}
{% block title %}Record Payment{% endblock %}
{% block page_title %}Record Payment{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6">
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Invoice *</label>
                <select name="invoice" id="invoiceSelect"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                    <option value="">-- Select Invoice --</option>
                    {% for invoice in invoices %}
                    <option value="{{ invoice.pk }}"
                        data-balance="{{ invoice.balance_due }}"
                        data-phone="{{ invoice.customer.phone }}">
                        #{{ invoice.invoice_number }} - {{ invoice.customer.name }}
                        (Balance: KES {{ invoice.balance_due|floatformat:2 }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Amount (KES) *</label>
                <input type="number" name="amount" id="amountInput" step="0.01"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="0.00" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Method *</label>
                <select name="method" id="methodSelect"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onchange="toggleMpesa(this.value)">
                    <option value="cash">Cash</option>
                    <option value="mpesa">M-Pesa (STK Push)</option>
                    <option value="bank">Bank Transfer</option>
                    <option value="cheque">Cheque</option>
                    <option value="card">Card</option>
                </select>
            </div>

            <!-- M-Pesa Phone Field -->
            <div id="mpesaField" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-mobile-alt text-green-600 mr-1"></i>
                    M-Pesa Phone Number
                </label>
                <input type="text" name="phone" id="phoneInput"
                    class="w-full px-4 py-2 border border-green-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="e.g. 0712345678">
                <p class="text-xs text-green-600 mt-1">
                    Customer will receive STK push prompt on their phone
                </p>
            </div>

            <div id="referenceField">
                <label class="block text-sm font-medium text-gray-700 mb-1">Reference</label>
                <input type="text" name="reference"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="e.g. M-Pesa code, cheque number">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Date *</label>
                <input type="date" name="payment_date" value="{{ today }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                <textarea name="notes" rows="2"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
        </div>

        <div class="flex space-x-3 mt-6">
            <button type="submit"
                class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition font-medium">
                <i class="fas fa-save mr-2"></i>Record Payment
            </button>
            <a href="{% url 'payment_list' %}"
                class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
function toggleMpesa(method) {
    const mpesaField = document.getElementById('mpesaField');
    if (method === 'mpesa') {
        mpesaField.classList.remove('hidden');
    } else {
        mpesaField.classList.add('hidden');
    }
}

// Auto-fill amount and phone from invoice
document.getElementById('invoiceSelect').addEventListener('change', function() {
    const option  = this.options[this.selectedIndex];
    const balance = option.getAttribute('data-balance');
    const phone   = option.getAttribute('data-phone');
    if (balance) document.getElementById('amountInput').value = parseFloat(balance).toFixed(2);
    if (phone)   document.getElementById('phoneInput').value  = phone;
});
</script>
{% endblock %}
