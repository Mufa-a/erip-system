{% extends 'base.html' %}
{% block title %}Delete Invoice{% endblock %}
{% block page_title %}Delete Invoice{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-6 text-center">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-trash text-red-600 text-2xl"></i>
    </div>
    <h3 class="text-lg font-semibold text-gray-800 mb-2">Delete Invoice</h3>
    <p class="text-gray-500 mb-6">Delete invoice <strong>#{{ invoice.invoice_number }}</strong>?</p>
    <form method="POST" class="flex space-x-3 justify-center">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition">
            Yes, Delete
        </button>
        <a href="{% url 'invoice_list' %}"
            class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
