<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERIP System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0f16;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -150px; right: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .auth-card {
            background: #181b26;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
        }
        .logo-wrap { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }
        .logo-title { font-size: 22px; font-weight: 600; color: #e8eaf0; letter-spacing: -0.3px; }
        .logo-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: #0d0f16;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            font-size: 14px;
            color: #e8eaf0;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        input::placeholder { color: #4b5563; }
        .btn-signin {
            width: 100%;
            padding: 11px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
            margin-top: 8px;
            letter-spacing: 0.2px;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-signin:hover {
            background: #4f46e5;
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }
        .alert-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #86efac;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
        .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }
        .footer-text { text-align: center; font-size: 12px; color: #4b5563; }
        .back-link { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: #6b7280; }
        .back-link a { color: #6366f1; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .emoji { font-size: 40px; text-align: center; display: block; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="logo-wrap">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <div class="logo-title">ERIP System</div>
        <div class="logo-sub">{% block subtitle %}{% endblock %}</div>
    </div>
    {% block content %}{% endblock %}
    <div class="divider"></div>
    <div class="footer-text">ERIP System &mdash; Business Management</div>
</div>
</body>
</html>
